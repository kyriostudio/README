name: Deploy to IONOS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-ionos
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      # ./dist/* n’inclut pas les dotfiles (ex. .htaccess) — sans réécriture Apache, les routes SPA
      # (/demos/difamex, etc.) renvoient 404 en accès direct ou refresh. Voir wlixcc/SFTP-Deploy-Action#59
      - name: Deploy dist to IONOS (SFTP)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.IONOS_SFTP_HOST }}
          username: ${{ secrets.IONOS_SFTP_USERNAME }}
          password: ${{ secrets.IONOS_SFTP_PASSWORD }}
          port: 22
          local_path: ./dist/*
          remote_path: /
          sftp_only: true
          sftpArgs: "-o ConnectTimeout=30 -o StrictHostKeyChecking=accept-new"

      - name: Deploy .htaccess (réécriture SPA)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.IONOS_SFTP_HOST }}
          username: ${{ secrets.IONOS_SFTP_USERNAME }}
          password: ${{ secrets.IONOS_SFTP_PASSWORD }}
          port: 22
          local_path: ./dist/.htaccess
          remote_path: /
          sftp_only: true
          sftpArgs: "-o ConnectTimeout=30 -o StrictHostKeyChecking=accept-new"
